    <text class="mono" x="1620" y="38" font-size="13" letter-spacing="2"><tspan class="brass">NOW&#160;&#160;&#9656;&#160;&#160;</tspan><tspan class="bone">SRIP 2026 &#8212; AI HALLUCINATION SUPPRESSION RESEARCH @ VIT</tspan><tspan class="brass">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan class="bone">SHIPPING FORGE</tspan><tspan class="brass">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan class="bone">BUILDING AMOEBA</tspan><tspan class="brass">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan><tspan class="bone">OPEN TO INTERNSHIPS &amp; COLLABORATION</tspan><tspan class="brass">&#160;&#160;&#160;&#10038;&#160;&#160;&#160;</tspan></text>
  </g>
  
  <defs>
    <linearGradient id="lm" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
