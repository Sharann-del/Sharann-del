<svg viewBox="0 0 1000 356" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience — Ambian Strategy, VIT SRIP, GeoPacific Solutions, VIT Chennai">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; } }
    .mono { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s} .a4{animation-delay:.75s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
  </style>

  <line x1="120" y1="10" x2="120" y2="346" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text class="mono" x="48" y="38" font-size="10" fill="var(--accent)" letter-spacing="2.5">2026</text>
    <text class="mono" x="136" y="38" font-size="13" fill="var(--bone)">Ambian Strategy · Full-Stack Developer Intern · Chennai</text>
    <text class="mono" x="136" y="60" font-size="12" fill="var(--muted)">built ProposalOS — AI-powered RFP discovery &amp; response platform from scratch</text>
    <text class="mono" x="136" y="78" font-size="12" fill="var(--muted)">scraped 11+ procurement portals with AI fit-scoring · response time: days → two hours</text>
  </g>

  <g class="rise a2">
    <text class="mono" x="48" y="130" font-size="10" fill="var(--accent)" letter-spacing="2.5">2026</text>
    <text class="mono" x="136" y="130" font-size="13" fill="var(--bone)">VIT Chennai · Summer Research Intern (SRIP 2026) · Dr. Sandhya P</text>
    <text class="mono" x="136" y="152" font-size="12" fill="var(--muted)">hallucination detection pipeline · confidence scoring → NER routing → Wikidata evidence retrieval</text>
    <text class="mono" x="136" y="170" font-size="12" fill="var(--muted)">RoBERTa NLI contradiction detection · blockchain audit layer · research paper published</text>
  </g>

  <g class="rise a3">
    <text class="mono" x="48" y="222" font-size="10" fill="var(--accent)" letter-spacing="2.5">2025</text>
    <text class="mono" x="136" y="222" font-size="13" fill="var(--bone)">GeoPacific Solutions · Billing Developer Intern · Chennai · Mar–Jul</text>
    <text class="mono" x="136" y="244" font-size="12" fill="var(--muted)">JSONB PostgreSQL schema · JWT auth across admin / franchise / cashier roles</text>
    <text class="mono" x="136" y="262" font-size="12" fill="var(--muted)">Node.js / Express APIs for invoice lifecycle · inventory updates · reporting endpoints</text>
  </g>

  <g class="rise a4">
    <text class="mono" x="48" y="314" font-size="10" fill="var(--accent)" letter-spacing="2.5">2024 –</text>
    <text class="mono" x="136" y="314" font-size="13" fill="var(--bone)">VIT Chennai · B.Tech Computer Science · Full-Stack &amp; iOS Track</text>
    <text class="mono" x="136" y="336" font-size="12" fill="var(--muted)">iSpace Club — Web &amp; App Development department</text>
  </g>
</svg>
