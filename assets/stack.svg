<svg viewBox="0 0 1000 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack — languages, mobile, web, data, ai, terminal, tooling">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --accent: #AAAAAA; } }
    .mono { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .rise { opacity: 0; animation: rise .6s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(6px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.1s} .a2{animation-delay:.2s} .a3{animation-delay:.3s} .a4{animation-delay:.4s} .a5{animation-delay:.5s} .a6{animation-delay:.6s} .a7{animation-delay:.7s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
  </style>

  <line x1="138" y1="8" x2="138" y2="202" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <text class="mono rise a1" x="48" y="28"  font-size="10" fill="var(--muted)" letter-spacing="2.5">LANGUAGES</text>
  <text class="mono rise a1" x="154" y="28"  font-size="13" fill="var(--bone)">Swift · TypeScript · JavaScript · Python · Dart · C++</text>

  <text class="mono rise a2" x="48" y="56"  font-size="10" fill="var(--muted)" letter-spacing="2.5">MOBILE</text>
  <text class="mono rise a2" x="154" y="56"  font-size="13" fill="var(--bone)">SwiftUI · WidgetKit · Core Data · Flutter</text>

  <text class="mono rise a3" x="48" y="84"  font-size="10" fill="var(--muted)" letter-spacing="2.5">WEB</text>
  <text class="mono rise a3" x="154" y="84"  font-size="13" fill="var(--bone)">React · Next.js · Node.js · Express · Tailwind</text>

  <text class="mono rise a4" x="48" y="112" font-size="10" fill="var(--muted)" letter-spacing="2.5">DATA</text>
  <text class="mono rise a4" x="154" y="112" font-size="13" fill="var(--bone)">PostgreSQL · Supabase · FastAPI · PostGIS · JSONB</text>

  <text class="mono rise a5" x="48" y="140" font-size="10" fill="var(--muted)" letter-spacing="2.5">AI</text>
  <text class="mono rise a5" x="154" y="140" font-size="13" fill="var(--bone)">MCP servers · OpenRouter · OpenAI API · AI-native architectures</text>

  <text class="mono rise a6" x="48" y="168" font-size="10" fill="var(--muted)" letter-spacing="2.5">TERMINAL</text>
  <text class="mono rise a6" x="154" y="168" font-size="13" fill="var(--bone)">TUI / CLI · Node.js blessed · keyboard-driven workflows</text>

  <text class="mono rise a7" x="48" y="196" font-size="10" fill="var(--muted)" letter-spacing="2.5">TOOLING</text>
  <text class="mono rise a7" x="154" y="196" font-size="13" fill="var(--bone)">Git · Docker · Figma · Notion · Postman · Neovim</text>
</svg>
