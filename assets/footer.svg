<svg viewBox="0 0 1000 110" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Status: building. Chennai, India. sharann.dev">
  <style>
    .mono{font-family:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif}
    .serif{font-family:"Inter Display",ui-sans-serif,system-ui,-apple-system,sans-serif}
    .draw{stroke:#E5E7EB;stroke-width:1;stroke-dasharray:1000;stroke-dashoffset:1000;animation:d 1.6s cubic-bezier(.6,0,.2,1) forwards}
    @keyframes d{to{stroke-dashoffset:0}}
    .dot{animation:p 2.4s ease-in-out infinite}
    .ring{animation:r 2.4s ease-out infinite;transform-origin:60px 64px}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes r{0%{transform:scale(.4);opacity:.8}80%,100%{transform:scale(2.6);opacity:0}}
    @media (prefers-reduced-motion:reduce){.draw,.dot,.ring{animation:none}.draw{stroke-dashoffset:0}.ring{opacity:0}}
  </style>
  <rect width="1000" height="110" fill="none"/>
  <line class="draw" x1="48" y1="24" x2="952" y2="24"/>
  <circle class="ring" cx="60" cy="64" r="5" stroke="#3B5BDB" stroke-width="1" fill="none"/>
  <circle class="dot" cx="60" cy="64" r="4" fill="#3B5BDB"/>
  <text class="mono" x="82" y="62" font-size="12" letter-spacing="3" fill="#1A1A1A">STATUS &#8212; BUILDING</text>
  <text class="mono" x="82" y="82" font-size="11" letter-spacing="2" fill="#6B7280">probably in a terminal, probably past midnight</text>
  <text class="serif" x="952" y="66" font-size="15" font-style="italic" text-anchor="end" fill="#6B7280">sharann.dev&#160;&#160;&#183;&#160;&#160;Chennai, IN&#160;&#160;&#183;&#160;&#160;&#169; 2026</text>
</svg>
